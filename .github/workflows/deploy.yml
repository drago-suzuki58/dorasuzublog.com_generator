name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      CONTENT_REPO_BRANCH: main
      THEME_REPO_BRANCH: customized

    steps:
      - name: Checkout generator
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync content
        run: npm run content:sync

      - name: Sync theme
        run: npm run theme:sync

      - name: Verify theme
        run: |
          test -d themes/VSC4T/layout
          test "$(git -C themes/VSC4T branch --show-current)" = "customized"

      - name: Generate redirects
        run: npm run redirects:generate

      - name: Check redirects
        run: npm run redirects:check

      - name: Check migrated images
        run: npm run images:migrate:check

      - name: Build
        run: npm run build

      - name: Deploy by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./public/
          server-dir: ./
